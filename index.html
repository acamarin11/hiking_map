<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏔 Planinarske rute Srbije</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; }

  #sidebar {
    width: 340px; min-width: 280px; height: 100vh;
    background: #1a1a2e; color: #e0e0e0;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 3px 0 15px rgba(0,0,0,0.4); z-index: 1000;
  }
  #sidebar-header { padding: 16px; background: #16213e; border-bottom: 1px solid #0f3460; }
  #sidebar-header h1 { font-size: 15px; color: #e0e0e0; margin-bottom: 2px; }
  #sidebar-header .subtitle { font-size: 11px; color: #8892a4; }

  #filters { padding: 12px; border-bottom: 1px solid #0f3460; background: #16213e; }
  .filter-label { font-size: 11px; color: #8892a4; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }

  #search-box {
    width: 100%; padding: 7px 10px; border-radius: 6px;
    border: 1px solid #0f3460; background: #0f3460;
    color: #e0e0e0; font-size: 12px; margin-bottom: 10px; outline: none;
  }
  #search-box::placeholder { color: #5a6a7a; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 8px; }
  select.flt {
    flex: 1; padding: 6px 8px; border-radius: 6px;
    border: 1px solid #0f3460; background: #0f3460;
    color: #e0e0e0; font-size: 12px; outline: none;
  }

  .diff-btns { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
  .diff-btn {
    padding: 4px 10px; border-radius: 12px; border: none;
    font-size: 11px; cursor: pointer; font-weight: 600;
    opacity: 0.4; transition: opacity .2s, transform .1s;
  }
  .diff-btn.active { opacity: 1; transform: scale(1.05); }
  .diff-btn.laka     { background: #27ae60; color: #fff; }
  .diff-btn.zahtevna { background: #f39c12; color: #fff; }
  .diff-btn.teska    { background: #e74c3c; color: #fff; }
  .diff-btn.nepoznata{ background: #7f8c8d; color: #fff; }

  #len-display { font-size: 11px; color: #8892a4; text-align: right; margin-bottom: 3px; }
  #len-slider { width: 100%; accent-color: #4CAF50; }

  #route-list { flex: 1; overflow-y: auto; padding: 0; }
  #route-list::-webkit-scrollbar { width: 5px; }
  #route-list::-webkit-scrollbar-track { background: #1a1a2e; }
  #route-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

  .route-item {
    padding: 10px 14px; border-bottom: 1px solid #0f3460;
    cursor: pointer; transition: background .15s; border-left: 3px solid transparent;
  }
  .route-item:hover { background: #16213e; }
  .route-item.active { background: #0f3460; border-left-color: #4CAF50; }
  .route-name { font-size: 12px; font-weight: 600; color: #d0d8e4; margin-bottom: 3px;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-meta { font-size: 11px; color: #5a6a7a; display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
  .tag-laka     { background: #1a4a2a; color: #27ae60; }
  .tag-zahtevna { background: #4a3010; color: #f39c12; }
  .tag-teska    { background: #4a1515; color: #e74c3c; }
  .tag-nepoznata{ background: #2a2a2a; color: #7f8c8d; }
  .tag-src      { background: #1a2a4a; color: #5b9bd5; }
  .no-results   { padding: 20px; text-align: center; color: #5a6a7a; font-size: 12px; }

  #map { flex: 1; height: 100vh; }

  .leaflet-popup-content-wrapper {
    background: #16213e; color: #e0e0e0; border-radius: 10px;
    border: 1px solid #0f3460; font-family: 'Segoe UI', sans-serif; min-width: 220px;
  }
  .leaflet-popup-tip { background: #16213e; }
  .popup-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; color: #fff; }
  .popup-row { font-size: 11px; margin-bottom: 3px; color: #8892a4; }
  .popup-row span { color: #d0d8e4; }
  .popup-links { margin-top: 8px; display: flex; gap: 8px; }
  .popup-link { padding: 4px 10px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: 600; }
  .popup-link.gpx    { background: #27ae60; color: #fff; }
  .popup-link.detail { background: #0f3460; color: #5b9bd5; border: 1px solid #5b9bd5; }

  #loading-track {
    position: absolute; top: 10px; right: 50%; transform: translateX(50%);
    background: #1a1a2e; color: #e0e0e0; padding: 6px 14px;
    border-radius: 20px; font-size: 12px; z-index: 999;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4); display: none;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>🏔 Planinarske rute Srbije</h1>
    <div class="subtitle" id="stats">Učitavanje...</div>
  </div>

  <div id="filters">
    <input id="search-box" placeholder="🔍 Pretraži po imenu..." oninput="applyFilters()">

    <div class="filter-label">Region</div>
    <div class="filter-row">
      <select class="flt" id="flt-region" onchange="populatePlanina(); applyFilters()">
        <option value="">Svi regioni</option>
      </select>
    </div>

    <div class="filter-label">Planina / predeo</div>
    <div class="filter-row">
      <select class="flt" id="flt-planina" onchange="applyFilters()">
        <option value="">Sve planine</option>
      </select>
    </div>

    <div class="filter-label">Izvor</div>
    <div class="filter-row">
      <select class="flt" id="flt-izvor" onchange="applyFilters()">
        <option value="">Svi izvori</option>
        <option value="PSS">Planinarski savez Srbije</option>
        <option value="Staze i Bogaze">Staze i Bogaze</option>
      </select>
    </div>

    <div class="filter-label">Težina</div>
    <div class="diff-btns">
      <button class="diff-btn laka active"      id="btn-Laka"      onclick="toggleDiff('Laka')">🟢 Laka</button>
      <button class="diff-btn zahtevna active"  id="btn-Zahtevna"  onclick="toggleDiff('Zahtevna')">🟡 Zahtevna</button>
      <button class="diff-btn teska active"     id="btn-Teška"     onclick="toggleDiff('Teška')">🔴 Teška</button>
      <button class="diff-btn teska active"     id="btn-VrloTeška" onclick="toggleDiff('Vrlo teška')">🔴 Vrlo teška</button>
      <button class="diff-btn nepoznata active" id="btn-Nepoznata" onclick="toggleDiff('—')">⚪ Nepoznata</button>
    </div>

    <div class="filter-label">Max dužina</div>
    <div id="len-display">0 – 100+ km</div>
    <input type="range" id="len-slider" min="0" max="100" value="100" step="1"
           oninput="updateLenDisplay(); applyFilters()">
  </div>

  <div id="route-list"></div>
</div>

<div id="map"></div>
<div id="loading-track">Učitavam rutu...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let allRoutes = [], filteredRoutes = [];
let activeDiffs = new Set(["Laka","Zahtevna","Teška","Vrlo teška","—"]);
let activeTrackLayer = null, activeItem = null;

const COLORS = {
  "Laka": "#27ae60", "Zahtevna": "#f39c12",
  "Teška": "#e74c3c", "Vrlo teška": "#c0392b",
  "—": "#7f8c8d", "": "#7f8c8d",
};
const colorFor = t => COLORS[t] || COLORS[""];
const diffClass = t => {
  if (t === "Laka") return "laka";
  if (t === "Zahtevna") return "zahtevna";
  if (t === "Teška" || t === "Vrlo teška") return "teska";
  return "nepoznata";
};

const map = L.map("map").setView([44.0, 21.0], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors", maxZoom: 18,
}).addTo(map);

fetch("routes.json")
  .then(r => r.json())
  .then(data => {
    allRoutes = data;
    populateRegions();
    applyFilters();
  })
  .catch(() => {
    document.getElementById("route-list").innerHTML =
      '<div class="no-results">❌ routes.json nije pronađen.</div>';
  });

function populateRegions() {
  const regions = [...new Set(allRoutes.map(r => r.region).filter(Boolean))].sort();
  const sel = document.getElementById("flt-region");
  regions.forEach(r => { const o = document.createElement("option"); o.value = r; o.textContent = r; sel.appendChild(o); });
}

function populatePlanina() {
  const region = document.getElementById("flt-region").value;
  const sel = document.getElementById("flt-planina");
  sel.innerHTML = '<option value="">Sve planine</option>';
  const planine = [...new Set(
    allRoutes.filter(r => !region || r.region === region).map(r => r.planina).filter(Boolean)
  )].sort();
  planine.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; sel.appendChild(o); });
}

function toggleDiff(d) {
  const ids = { "Laka":"Laka","Zahtevna":"Zahtevna","Teška":"Teška","Vrlo teška":"VrloTeška","—":"Nepoznata" };
  const btn = document.getElementById("btn-" + ids[d]);
  if (activeDiffs.has(d)) { activeDiffs.delete(d); btn.classList.remove("active"); }
  else                    { activeDiffs.add(d);    btn.classList.add("active"); }
  applyFilters();
}

function updateLenDisplay() {
  const v = +document.getElementById("len-slider").value;
  document.getElementById("len-display").textContent = v >= 100 ? "0 – 100+ km" : `0 – ${v} km`;
}

function applyFilters() {
  const search  = document.getElementById("search-box").value.toLowerCase();
  const region  = document.getElementById("flt-region").value;
  const planina = document.getElementById("flt-planina").value;
  const izvor   = document.getElementById("flt-izvor").value;
  const maxLen  = +document.getElementById("len-slider").value;

  filteredRoutes = allRoutes.filter(r => {
    if (search  && !r.ime.toLowerCase().includes(search)) return false;
    if (region  && r.region  !== region)  return false;
    if (planina && r.planina !== planina) return false;
    if (izvor   && r.izvor   !== izvor)   return false;
    const diff = r.tezina || "—";
    if (!activeDiffs.has(diff)) return false;
    if (maxLen < 100) {
      const km = parseFloat(r.duzina);
      if (!isNaN(km) && km > maxLen) return false;
    }
    return true;
  });

  renderList();
  document.getElementById("stats").textContent = `${filteredRoutes.length} od ${allRoutes.length} ruta`;
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderList() {
  const c = document.getElementById("route-list");
  if (!filteredRoutes.length) {
    c.innerHTML = '<div class="no-results">Nema rezultata.</div>'; return;
  }
  c.innerHTML = filteredRoutes.map((r, i) => {
    const diff = r.tezina || "—";
    const src  = r.izvor === "PSS" ? "PSS" : "S&B";
    return `<div class="route-item" id="item-${i}" onclick="selectRoute(${i})">
      <div class="route-name" title="${escHtml(r.ime)}">${escHtml(r.ime)||"(bez naziva)"}</div>
      <div class="route-meta">
        ${r.duzina ? `<span>📏 ${r.duzina}</span>` : ""}
        ${r.visinska_razlika ? `<span>⬆ ${r.visinska_razlika}</span>` : ""}
        <span class="tag tag-${diffClass(diff)}">${diff}</span>
        <span class="tag tag-src">${src}</span>
      </div>
    </div>`;
  }).join("");
}

function selectRoute(idx) {
  const route = filteredRoutes[idx];
  if (!route) return;
  if (activeItem !== null) {
    const prev = document.getElementById(`item-${activeItem}`);
    if (prev) prev.classList.remove("active");
  }
  activeItem = idx;
  const el = document.getElementById(`item-${idx}`);
  if (el) { el.classList.add("active"); el.scrollIntoView({block:"nearest"}); }
  if (activeTrackLayer) { map.removeLayer(activeTrackLayer); activeTrackLayer = null; }

  if (route.gpx_file) {
    document.getElementById("loading-track").style.display = "block";
    fetch(route.gpx_file)
      .then(r => r.text())
      .then(gpxText => {
        document.getElementById("loading-track").style.display = "none";
        const layer = gpxToLayer(gpxText, colorFor(route.tezina || ""));
        if (layer) {
          layer.addTo(map); activeTrackLayer = layer;
          const b = layer.getBounds();
          if (b.isValid()) map.fitBounds(b, {padding:[30,30]});
          showPopup(route, b.getCenter());
        }
      })
      .catch(() => { document.getElementById("loading-track").style.display = "none"; showPopup(route, map.getCenter()); });
  } else {
    showPopup(route, map.getCenter());
  }
}

function gpxToLayer(gpxText, color) {
  try {
    const xml = new DOMParser().parseFromString(gpxText, "text/xml");
    const coords = [];
    xml.querySelectorAll("trkpt").forEach(pt => {
      const lat = parseFloat(pt.getAttribute("lat")), lon = parseFloat(pt.getAttribute("lon"));
      if (!isNaN(lat) && !isNaN(lon)) coords.push([lat, lon]);
    });
    if (!coords.length) xml.querySelectorAll("rtept").forEach(pt => {
      const lat = parseFloat(pt.getAttribute("lat")), lon = parseFloat(pt.getAttribute("lon"));
      if (!isNaN(lat) && !isNaN(lon)) coords.push([lat, lon]);
    });
    return coords.length ? L.polyline(coords, {color, weight:4, opacity:0.85}) : null;
  } catch(e) { return null; }
}

function showPopup(route, latlng) {
  const diff = route.tezina || "—";
  const links = [
    route.gpx_file    ? `<a class="popup-link gpx"    href="${route.gpx_file}"    target="_blank">⬇ GPX</a>` : "",
    route.detail_link ? `<a class="popup-link detail"  href="${route.detail_link}" target="_blank">🔗 Detalji</a>` : "",
  ].join("");
  L.popup({maxWidth:280}).setLatLng(latlng).setContent(`
    <div class="popup-title">${escHtml(route.ime)}</div>
    <div class="popup-row">📍 Region: <span>${escHtml(route.region)}</span></div>
    <div class="popup-row">⛰ Planina: <span>${escHtml(route.planina)}</span></div>
    ${route.duzina           ? `<div class="popup-row">📏 Dužina: <span>${route.duzina}</span></div>` : ""}
    ${route.visinska_razlika ? `<div class="popup-row">⬆ Uspon: <span>${route.visinska_razlika}</span></div>` : ""}
    <div class="popup-row">🎯 Težina: <span style="color:${colorFor(diff)}">${diff}</span></div>
    <div class="popup-row">📂 Izvor: <span>${escHtml(route.izvor)}</span></div>
    ${links ? `<div class="popup-links">${links}</div>` : ""}
  `).openOn(map);
}
</script>
</body>
</html>
